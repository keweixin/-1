server:
  port: 8080

spring:
  application:
    name: bylw-spring
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:3306/bylw?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: "1"
    locations: classpath:db/migration
    encoding: UTF-8
    validate-on-migrate: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: ${JWT_SECRET:bylw-dev-only-replace-in-production-32chars}
  expiration: ${JWT_EXPIRATION:86400000}

app:
  cors:
    allowed-origins: http://localhost:3000,http://localhost:5173,http://localhost:3001,http://localhost:3002,http://localhost:3003,http://localhost:3004
